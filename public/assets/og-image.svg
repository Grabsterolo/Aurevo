<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="textgrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="80" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <clipPath id="card-clip">
      <rect x="620" y="48" width="536" height="534" rx="28"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D0D0B"/>

  <!-- Ambient glow blobs -->
  <ellipse cx="220" cy="210" rx="380" ry="300" fill="url(#blob1)" filter="url(#glow)"/>
  <ellipse cx="1040" cy="480" rx="320" ry="260" fill="url(#blob2)" filter="url(#glow)"/>

  <!-- ── LEFT COLUMN ── -->

  <!-- Logo -->
  <circle cx="80" cy="100" r="11" fill="url(#brand)"/>
  <text x="104" y="113"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="36" font-weight="700" fill="white" letter-spacing="-1">Aurevo</text>

  <!-- Headline line 1 -->
  <text x="80" y="232"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="82" font-weight="800" fill="white" letter-spacing="-4">Sitios web</text>

  <!-- Headline line 2 — gradient -->
  <text x="80" y="330"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="82" font-weight="800" letter-spacing="-4" fill="url(#textgrad)">a medida.</text>

  <!-- Subline -->
  <text x="80" y="400"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26" fill="rgba(255,255,255,0.45)" letter-spacing="-0.3">Para negocios que quieren verse profesionales</text>
  <text x="80" y="434"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="26" fill="rgba(255,255,255,0.45)" letter-spacing="-0.3">y conseguir más clientes.</text>

  <!-- Domain pill -->
  <rect x="80" y="486" width="300" height="48" rx="24"
    fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.13)" stroke-width="1"/>
  <circle cx="115" cy="510" r="5" fill="url(#brand)"/>
  <text x="132" y="516"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="18" fill="rgba(255,255,255,0.4)" letter-spacing="0">aurevo-3nr.pages.dev</text>

  <!-- Divider -->
  <line x1="590" y1="60" x2="590" y2="570" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- ── RIGHT COLUMN: Glass hero card ── -->
  <rect x="620" y="48" width="536" height="534" rx="28"
    fill="rgba(255,255,255,0.055)" stroke="rgba(255,255,255,0.11)" stroke-width="1"/>

  <!-- Browser chrome -->
  <rect x="640" y="70" width="496" height="40" rx="8" fill="rgba(255,255,255,0.04)"/>
  <circle cx="668" cy="90" r="6" fill="rgba(255,99,99,0.5)"/>
  <circle cx="690" cy="90" r="6" fill="rgba(255,196,0,0.4)"/>
  <circle cx="712" cy="90" r="6" fill="rgba(50,215,75,0.4)"/>
  <rect x="740" y="80" width="240" height="20" rx="10" fill="rgba(255,255,255,0.06)"/>
  <text x="860" y="95"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="12" fill="rgba(255,255,255,0.25)" text-anchor="middle">aurevo.com</text>

  <!-- Nav bar -->
  <rect x="640" y="122" width="496" height="42" fill="rgba(0,0,0,0.25)"/>
  <!-- Nav logo -->
  <circle cx="668" cy="143" r="5" fill="url(#brand)"/>
  <rect x="682" y="136" width="48" height="14" rx="3" fill="rgba(255,255,255,0.2)"/>
  <!-- Nav links -->
  <rect x="760" y="138" width="36" height="10" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="806" y="138" width="36" height="10" rx="3" fill="rgba(255,255,255,0.08)"/>
  <rect x="852" y="138" width="36" height="10" rx="3" fill="rgba(255,255,255,0.08)"/>
  <!-- CTA nav -->
  <rect x="1060" y="131" width="66" height="24" rx="12" fill="rgba(255,255,255,0.92)"/>

  <!-- Hero content area -->
  <rect x="640" y="180" width="496" height="258" rx="0" fill="rgba(0,0,0,0.1)"/>

  <!-- Big headline lines -->
  <rect x="668" y="202" width="300" height="24" rx="5" fill="rgba(255,255,255,0.65)"/>
  <rect x="668" y="238" width="230" height="24" rx="5" fill="rgba(255,255,255,0.45)"/>

  <!-- Sub text lines -->
  <rect x="668" y="284" width="340" height="11" rx="4" fill="rgba(255,255,255,0.13)"/>
  <rect x="668" y="304" width="280" height="11" rx="4" fill="rgba(255,255,255,0.09)"/>

  <!-- CTAs -->
  <rect x="668" y="336" width="170" height="44" rx="22" fill="rgba(255,255,255,0.93)"/>
  <rect x="852" y="336" width="130" height="44" rx="22"
    fill="transparent" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>

  <!-- Trust pills row -->
  <rect x="640" y="452" width="150" height="56" rx="12"
    fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <rect x="802" y="452" width="150" height="56" rx="12"
    fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <rect x="964" y="452" width="152" height="56" rx="12"
    fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
  <text x="715" y="476"
    font-family="system-ui,sans-serif" font-size="14" font-weight="700"
    fill="white" text-anchor="middle">1–3 sem.</text>
  <text x="715" y="495"
    font-family="system-ui,sans-serif" font-size="11"
    fill="rgba(255,255,255,0.35)" text-anchor="middle">De brief a live</text>
  <text x="877" y="476"
    font-family="system-ui,sans-serif" font-size="12" font-weight="700"
    fill="white" text-anchor="middle">Sin WordPress</text>
  <text x="877" y="495"
    font-family="system-ui,sans-serif" font-size="11"
    fill="rgba(255,255,255,0.35)" text-anchor="middle">Código propio</text>
  <text x="1040" y="476"
    font-family="system-ui,sans-serif" font-size="14" font-weight="700"
    fill="white" text-anchor="middle">100% tuyo</text>
  <text x="1040" y="495"
    font-family="system-ui,sans-serif" font-size="11"
    fill="rgba(255,255,255,0.35)" text-anchor="middle">Sin ataduras</text>

  <!-- Price chips at bottom -->
  <rect x="640" y="522" width="250" height="44" rx="12"
    fill="rgba(79,70,229,0.18)" stroke="rgba(79,70,229,0.35)" stroke-width="1"/>
  <rect x="906" y="522" width="250" height="44" rx="12"
    fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
  <text x="765" y="549"
    font-family="system-ui,sans-serif" font-size="17" font-weight="700"
    fill="white" text-anchor="middle">Landing · Desde $200</text>
  <text x="1031" y="549"
    font-family="system-ui,sans-serif" font-size="17" font-weight="700"
    fill="white" text-anchor="middle">Sitio completo · $450</text>

</svg>
